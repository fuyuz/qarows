project:
  name: "qarows"
  id: qarows
  version: 1

environments:
  - id: chrome-desktop
    name: "Chrome (Desktop)"
  - id: firefox-desktop
    name: "Firefox (Desktop)"
  - id: safari-desktop
    name: "Safari (Desktop)"

categoryTargets:
  - match:
      major: "ファイル読み込み"
    required: all

  - match:
      major: "セッション"
    required: any
    targets:
      - chrome-desktop
      - firefox-desktop

  - match:
      major: "テスト実行"
    required: all
    targets:
      - chrome-desktop
      - firefox-desktop
      - safari-desktop

scenarios:
  - id: first-time-setup
    name: "初回セットアップ"
    description: |
      未読み込み状態から tests.yml を読み込み、セッションを開始し、
      ランナーで1件目の結果入力までを通しで確認する。
    steps:
      - TC-001
      - TC-002
      - TC-007
      - TC-009
      - TC-010

  - id: filter-and-progress
    name: "フィルタと進捗"
    description: |
      大・中・小分類フィルタと進捗バーが連動することを、
      意図した順で触って確認する。
    steps:
      - TC-015
      - TC-016
      - TC-022
      - TC-018
      - TC-019

  - id: runner-full
    name: "ランナー一通り"
    description: |
      使い方カードから完了カードまで、ランナーの画面・入力・操作を
      一通り確認する。
    steps:
      - TC-009
      - TC-010
      - TC-011
      - TC-014
      - TC-020
      - TC-021
      - TC-012

testCases:
  - id: TC-001
    category:
      major: "ファイル読み込み"
      minor: "ドロップ"
    prerequisites: "プロジェクト未読み込みの状態"
    description: "tests.yml をドロップゾーンにドロップしてファイル名が表示される"

  - id: TC-002
    category:
      major: "ファイル読み込み"
      minor: "サンプル"
    prerequisites: "プロジェクト未読み込みの状態"
    description: "「サンプルを試す」で tests.yml が読み込まれ、セッション設定へ進める"

  - id: TC-003
    category:
      major: "ファイル読み込み"
      minor: "results.json"
    prerequisites: "tests.yml 読み込み済み"
    description: "results.json を任意で追加読み込みできる"

  - id: TC-004
    category:
      major: "永続化"
      minor: "IndexedDB"
    prerequisites: "tests.yml 読み込み済み"
    description: "ページをリロードしてもプロジェクト・セッション・結果・フィルタ状態が復元される"

  - id: TC-005
    category:
      major: "セッション"
      medium: "設定"
      minor: "環境選択"
    prerequisites: "tests.yml 読み込み済み、セッション未開始"
    description: "端末/環境をチェックボックスで選択でき、「すべて選択」で一括選択できる"

  - id: TC-006
    category:
      major: "セッション"
      medium: "設定"
      minor: "実施者名"
    prerequisites: "tests.yml 読み込み済み、セッション未開始"
    description: "実施者名が未入力、または端末/環境が未選択の場合、テスト実行を開始できない"

  - id: TC-007
    category:
      major: "セッション"
      medium: "設定"
      minor: "開始"
    prerequisites: "実施者名と端末/環境を1つ以上選択済み"
    description: "テスト実行を開始して /run に遷移する。有効なセッションがあれば / から /run に直接復帰する"

  - id: TC-008
    category:
      major: "対象端末"
      medium: "解決"
      minor: "categoryTargets"
    description: "categoryTargets と targetEnvironments で対象端末が解決され、セッション選択との交差後に inScope が判定される"
    targetEnvironments:
      required: any
      targets:
        - safari-desktop

  - id: TC-009
    category:
      major: "テスト実行"
      medium: "画面"
      minor: "使い方"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "最初に使い方カード（START）が表示され、次へでテスト入力に進める"

  - id: TC-010
    category:
      major: "テスト実行"
      medium: "入力"
      minor: "結果"
    prerequisites: "テスト実行画面を表示中、使い方カードを過ぎていること"
    description: "1件ずつテストを表示し、一括 OK/NG または端末ごとに OK/NG/SKIP を入力できる。メモも保存される"

  - id: TC-011
    category:
      major: "テスト実行"
      medium: "入力"
      minor: "自動移動"
    prerequisites: "テスト実行画面を表示中"
    description: "結果入力後、自動で次のテストへ移動する。最後のテスト後は完了カードへ進む"

  - id: TC-012
    category:
      major: "テスト実行"
      medium: "画面"
      minor: "完了"
    prerequisites: "表示中のフィルタ対象テストをすべて入力済み"
    description: "最後のテスト入力後に完了カード（完了バッジ・チェックアイコン）が表示される"

  - id: TC-013
    category:
      major: "テスト実行"
      medium: "画面"
      minor: "カード幅"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "テストカードの横幅が画面幅の約88%以内に収まり、最大幅（42rem）を超えて広がらない"

  - id: TC-014
    category:
      major: "テスト実行"
      medium: "画面"
      minor: "ナビ"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "←/h →/l で前後のテストに移動できる（使い方・完了カードを含む）。一括入力は全端末が対象"

  - id: TC-015
    category:
      major: "テスト実行"
      medium: "フィルタ"
      minor: "大分類"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "大分類を選ぶと対象件数・ランナー・進捗バーのフィルタ行が絞り込まれる"

  - id: TC-016
    category:
      major: "テスト実行"
      medium: "フィルタ"
      minor: "中分類"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "中分類を選ぶと対象件数がさらに絞り込まれる。大分類変更時は無効な中分類がクリアされる"

  - id: TC-022
    category:
      major: "テスト実行"
      medium: "フィルタ"
      minor: "小分類"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "小分類を選ぶと対象件数がさらに絞り込まれる。大分類・中分類変更時は無効な小分類がクリアされる"

  - id: TC-017
    category:
      major: "テスト実行"
      medium: "フィルタ"
      minor: "未実施のみ"
    prerequisites: "テスト実行画面 (/run) を表示中、完了済みテストが1件以上あること"
    description: "未実施のみをオンにすると、完了済みテストがランナーから除外される"

  - id: TC-018
    category:
      major: "テスト実行"
      medium: "進捗"
      minor: "バー"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "画面下部にフィルタ行と全体行の2本の進捗バーが表示される（バー上・ラベル下）"

  - id: TC-019
    category:
      major: "テスト実行"
      medium: "進捗"
      minor: "ホバー"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "進捗バーの色付き部分にホバーすると、ステータス別件数と N / M 完了が表示される"

  - id: TC-020
    category:
      major: "テスト実行"
      medium: "操作"
      minor: "キーボード"
    prerequisites: "テストカード表示中（メモ欄フォーカス外）"
    description: "o/n/s で選択中の全端末に一括 OK/NG/SKIP を入力できる。メモ入力中はキーボード操作が無効"

  - id: TC-021
    category:
      major: "テスト実行"
      medium: "操作"
      minor: "ショートカットヘルプ"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "画面右下の ? にホバーするとキーボードショートカット一覧が表示される"

  - id: TC-023
    category:
      major: "テスト実行"
      medium: "シナリオ"
      minor: "モード切替"
    prerequisites: "tests.yml に scenarios が定義されていること"
    description: "フィルタとシナリオを排他で切り替えられ、シナリオ選択時は分類フィルタが無効になる"

  - id: TC-024
    category:
      major: "テスト実行"
      medium: "シナリオ"
      minor: "タスク一覧"
    prerequisites: "テスト実行画面 (/run) を表示中"
    description: "左のテスト一覧にシナリオの steps 順で項目が並び、name/description・進行状況が表示され、クリックでジャンプできる"

  - id: TC-025
    category:
      major: "テスト実行"
      medium: "フィードバック"
      minor: "入力"
    prerequisites: "テスト実行画面を表示中、複数端末のテストを表示中"
    description: "OK/NG 入力時にステータスバッジが切り替わり、一覧の該当行が一瞬ハイライトされ、次のテストへスライド遷移する"

  - id: TC-026
    category:
      major: "テスト実行"
      medium: "進捗"
      minor: "残り件数"
    prerequisites: "テスト実行画面 (/run) を表示中、未完了のテストが1件以上あること"
    description: "進捗バー右側に N / M と残り件数が表示される"

  - id: TC-027
    category:
      major: "ファイル読み込み"
      medium: "フィードバック"
      minor: "ファイル追加"
    prerequisites: "プロジェクト未読み込みの状態"
    description: "tests.yml を追加するとファイル行がフェードインで表示される"

  - id: TC-028
    category:
      major: "セッション"
      medium: "フィードバック"
      minor: "バリデーション"
    prerequisites: "セッション設定画面を表示中"
    description: "実施者名未入力で開始しようとすると入力欄が軽く揺れ、エラーメッセージが表示される"

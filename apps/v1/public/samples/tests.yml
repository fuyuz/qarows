project:
  name: "qarows"
  id: qarows
  version: 1

environments:
  - id: chrome-desktop
    name: "Chrome (Desktop)"
  - id: firefox-desktop
    name: "Firefox (Desktop)"
  - id: safari-desktop
    name: "Safari (Desktop)"

categoryTargets:
  - match:
      major: "ファイル読み込み"
    required: all

  - match:
      major: "セッション"
    required: any
    targets:
      - chrome-desktop
      - firefox-desktop

testCases:
  - id: TC-001
    category:
      major: "ファイル読み込み"
      minor: "ドロップ"
    prerequisites: "プロジェクト未読み込みの状態"
    description: "tests.yml をドロップゾーンにドロップしてファイル名が表示される"

  - id: TC-002
    category:
      major: "ファイル読み込み"
      minor: "サンプル"
    prerequisites: "プロジェクト未読み込みの状態"
    description: "「サンプルを試す」で tests.yml が読み込まれテスト開始できる"

  - id: TC-003
    category:
      major: "ファイル読み込み"
      minor: "results.json"
    prerequisites: "tests.yml 読み込み済み"
    description: "results.json を任意で追加読み込みできる"

  - id: TC-004
    category:
      major: "永続化"
      minor: "IndexedDB"
    prerequisites: "tests.yml 読み込み済み"
    description: "ページをリロードしてもプロジェクト状態が復元される"

  - id: TC-005
    category:
      major: "セッション"
      minor: "環境選択"
    prerequisites: "tests.yml 読み込み済み、セッション未開始"
    description: "端末/環境をチェックボックスで選択できる"

  - id: TC-006
    category:
      major: "セッション"
      minor: "フィルタ"
    prerequisites: "セッション設定画面を表示中"
    description: "大分類フィルタと未実施のみで対象件数が変わる"

  - id: TC-007
    category:
      major: "セッション"
      minor: "開始"
    prerequisites: "実施者名と端末/環境を選択済み"
    description: "テスト実行を開始して /run に遷移する"

  - id: TC-008
    category:
      major: "対象端末"
      medium: "解決"
      minor: "categoryTargets"
    description: "categoryTargets と targetEnvironments で対象端末が解決される"
    targetEnvironments:
      required: any
      targets:
        - safari-desktop
